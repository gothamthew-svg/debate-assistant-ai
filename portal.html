<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Entry Portal — Sunset HS Speech & Debate</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0F2140;
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --blue-mid: #B5D4F4;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --border: #D3D1C7;
      --surface: #F7F6F3;
      --white: #FFFFFF;
      --text: #0F2140;
      --muted: #5F5E5A;
      --subtle: #888780;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--surface); color: var(--text); padding: 0; margin: 0; font-size: 14px; line-height: 1.5; }
    .page { max-width: 740px; margin: 0 auto; padding: 28px 20px 40px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--navy); padding-bottom: 14px; margin-bottom: 24px; }
    .org-name { font-size: 13px; font-weight: 600; color: var(--navy); text-transform: uppercase; letter-spacing: 0.1em; }
    .page-label { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; }
    .loading { text-align: center; padding: 64px 20px; color: var(--muted); font-size: 13px; }
    .loading-bar { width: 120px; height: 2px; background: var(--border); margin: 0 auto 16px; position: relative; overflow: hidden; }
    .loading-bar::after { content: ''; position: absolute; left: -40%; width: 40%; height: 100%; background: var(--navy); animation: slide 1s ease-in-out infinite; }
    @keyframes slide { to { left: 140%; } }
    .card { background: var(--white); border: 1px solid var(--border); margin-bottom: 20px; }
    .card-head { background: var(--navy); padding: 16px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .card-head-left { flex: 1; }
    .tourn-name { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .tourn-sub { font-size: 12px; color: rgba(255,255,255,0.55); font-family: 'IBM Plex Mono', monospace; }
    .tabroom-btn { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.85); text-decoration: none; border: 1px solid rgba(255,255,255,0.3); padding: 5px 12px; white-space: nowrap; font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.04em; text-transform: uppercase; }
    .tabroom-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 10px 20px 6px; border-bottom: 1px solid var(--border); background: var(--surface); border-top: 1px solid var(--border); }
    .info-table { width: 100%; border-collapse: collapse; }
    .info-table tr { border-bottom: 1px solid var(--border); }
    .info-table tr:last-child { border-bottom: none; }
    .info-table td { padding: 10px 20px; font-size: 13px; vertical-align: top; }
    .info-table td:first-child { width: 42%; color: var(--muted); font-weight: 500; }
    .info-table td:last-child { color: var(--text); }
    .status-row { display: flex; align-items: stretch; border-bottom: 1px solid var(--border); }
    .status-row:last-child { border-bottom: none; }
    .status-indicator { width: 4px; flex-shrink: 0; }
    .status-indicator.warn { background: var(--amber); }
    .status-indicator.danger { background: var(--red); }
    .status-indicator.ok { background: var(--green); }
    .status-indicator.info { background: var(--blue); }
    .status-content { padding: 10px 20px; flex: 1; display: flex; align-items: baseline; gap: 16px; }
    .status-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); min-width: 160px; flex-shrink: 0; }
    .status-value { font-size: 13px; color: var(--text); }
    .status-badge { display: inline-block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; padding: 2px 8px; margin-left: 8px; vertical-align: middle; }
    .badge-warn { background: var(--amber-light); color: var(--amber); }
    .badge-danger { background: var(--red-light); color: var(--red); }
    .badge-ok { background: var(--green-light); color: var(--green); }
    .events-wrap { padding: 12px 20px 14px; }
    .events-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .event-pill { font-size: 11px; font-weight: 500; padding: 3px 10px; border: 1px solid var(--blue-mid); color: var(--blue); background: var(--blue-light); font-family: 'IBM Plex Mono', monospace; }
    .card-foot { border-top: 1px solid var(--border); padding: 8px 20px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; }
    .foot-note { font-size: 11px; color: var(--subtle); font-family: 'IBM Plex Mono', monospace; }
    .refresh-btn { font-size: 11px; color: var(--blue); background: none; border: none; cursor: pointer; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 0.06em; padding: 0; }
    .refresh-btn:hover { text-decoration: underline; }
    .page-footer { margin-top: 24px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .footer-note { font-size: 11px; color: var(--subtle); font-family: 'IBM Plex Mono', monospace; }
    @media (max-width: 500px) {
      .status-content { flex-direction: column; gap: 3px; }
      .status-label { min-width: unset; }
      .card-head { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div class="org-name">Sunset HS — Speech &amp; Debate</div>
    <div class="page-label">Tournament Entry Portal</div>
  </div>
  <div id="content">
    <div class="loading">
      <div class="loading-bar"></div>
      Fetching live tournament data...
    </div>
  </div>
  <div class="page-footer">
    <div class="footer-note" id="updated-at">—</div>
    <div class="footer-note">Data: Tabroom &amp; Team Sheet · Refreshes hourly</div>
  </div>
</div>
<script>
  const API = 'https://debate-assistant-ai.vercel.app/api/refresh';
  const TOURN_ID = '37036';

  function get(str, label) {
    const m = str.match(new RegExp(label + '[:\\s]+([^\\n\\r]+)', 'i'));
    return m ? m[1].trim() : null;
  }

  function parseData(results) {
    let tabroomCtx = '', sheetCtx = '';
    for (const key of Object.keys(results)) {
      const val = results[key].preview || results[key].data || '';
      if (key === 'Google Sheet') sheetCtx = val;
      else tabroomCtx += val + '\n';
    }
    const eventsMatch = tabroomCtx.match(/Events:([\s\S]*?)(?:Entry Fee|---|\n\n)/i);
    const events = eventsMatch
      ? eventsMatch[1].split('\n').map(l => l.replace(/[•\-]/g,'').trim()).filter(l => l.length > 2)
      : [];
    return {
      date: get(tabroomCtx, 'Tournament Date'),
      venue: get(tabroomCtx, 'Venue'),
      city: get(tabroomCtx, 'City'),
      regCloses: get(tabroomCtx, 'Registration Closes'),
      dropDeadline: get(tabroomCtx, 'Drop Deadline') || get(sheetCtx, 'Drop deadline'),
      judgesDue: get(tabroomCtx, 'Judge Info Due'),
      contact: get(tabroomCtx, 'Contact'),
      entryFee: get(tabroomCtx, 'Entry Fee'),
      events,
      busStart: get(sheetCtx, 'Bus start'),
      busEnd: get(sheetCtx, 'Bus end'),
      busLocation: get(sheetCtx, 'Bus location'),
      lastSignup: get(sheetCtx, 'Last Date to sign up for tournaments'),
      changeDeadline: get(sheetCtx, 'Deadline for changing events'),
      judges: get(sheetCtx, 'Judges\\?') || get(sheetCtx, 'Judges'),
    };
  }

  function judgeStatus(str) {
    if (!str) return { ok: false, text: 'Not confirmed' };
    const m = str.match(/(\d+)\/(\d+)/);
    if (m) { const met = parseInt(m[1]), total = parseInt(m[2]); return { ok: met >= total, text: str }; }
    return { ok: !str.toLowerCase().includes('not'), text: str };
  }

  function render(results, refreshedAt) {
    const d = parseData(results);
    const judge = judgeStatus(d.judges);
    const tournKeys = Object.keys(results).filter(k => k !== 'Google Sheet');
    let html = '';

    for (const tournName of tournKeys) {
      html += `
      <div class="card">
        <div class="card-head">
          <div class="card-head-left">
            <div class="tourn-name">${tournName}</div>
            <div class="tourn-sub">${d.venue || 'Sunset High School'}&nbsp;·&nbsp;${d.city || 'Portland, OR'}</div>
          </div>
          <a class="tabroom-btn" href="https://www.tabroom.com/index/tourn/index.mhtml?tourn_id=${TOURN_ID}" target="_blank">Tabroom ↗</a>
        </div>

        <div class="section-label">Dates &amp; deadlines</div>
        <table class="info-table">
          <tr><td>Tournament date</td><td>${d.date || '—'}</td></tr>
          <tr><td>Registration closes</td><td>${d.regCloses || '—'}</td></tr>
          <tr><td>Drop deadline</td><td>${d.dropDeadline || '—'}</td></tr>
          <tr><td>Judge info due</td><td>${d.judgesDue || '—'}</td></tr>
          ${d.lastSignup ? `<tr><td>Team sign-up deadline</td><td>${d.lastSignup}</td></tr>` : ''}
          ${d.changeDeadline ? `<tr><td>Event change deadline</td><td>${d.changeDeadline}</td></tr>` : ''}
        </table>

        <div class="section-label">Fees &amp; contact</div>
        <table class="info-table">
          <tr><td>Entry fee</td><td>${d.entryFee || '—'}</td></tr>
          <tr><td>Tournament contact</td><td>${d.contact || '—'}</td></tr>
        </table>

        <div class="section-label">Requirements &amp; logistics</div>
        <div class="status-row">
          <div class="status-indicator ${judge.ok ? 'ok' : 'danger'}"></div>
          <div class="status-content">
            <div class="status-label">Judge obligation</div>
            <div class="status-value">${judge.text}<span class="status-badge ${judge.ok ? 'badge-ok' : 'badge-danger'}">${judge.ok ? 'Met' : 'Not met'}</span></div>
          </div>
        </div>
        ${d.busStart ? `
        <div class="status-row">
          <div class="status-indicator info"></div>
          <div class="status-content">
            <div class="status-label">Bus departure</div>
            <div class="status-value">${d.busStart}${d.busLocation ? ' · ' + d.busLocation : ''}</div>
          </div>
        </div>
        <div class="status-row">
          <div class="status-indicator info"></div>
          <div class="status-content">
            <div class="status-label">Bus return</div>
            <div class="status-value">${d.busEnd || '—'}</div>
          </div>
        </div>` : `
        <div class="status-row">
          <div class="status-indicator warn"></div>
          <div class="status-content">
            <div class="status-label">Transportation</div>
            <div class="status-value">No bus provided — arrange your own transport</div>
          </div>
        </div>`}
        <div class="status-row">
          <div class="status-indicator info"></div>
          <div class="status-content">
            <div class="status-label">Dress code</div>
            <div class="status-value">Business professional</div>
          </div>
        </div>

        ${d.events.length > 0 ? `
        <div class="section-label">Events offered</div>
        <div class="events-wrap">
          <div class="events-list">${d.events.map(e => `<span class="event-pill">${e}</span>`).join('')}</div>
        </div>` : ''}

        <div class="card-foot">
          <div class="foot-note">Live data · updates automatically</div>
          <button class="refresh-btn" onclick="loadData()">Refresh now</button>
        </div>
      </div>`;
    }

    document.getElementById('content').innerHTML = html;
    const t = new Date(refreshedAt);
    document.getElementById('updated-at').textContent = 'Last updated ' +
      t.toLocaleDateString('en-US', {month:'short', day:'numeric'}) + ' at ' +
      t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  async function loadData() {
    try {
      const res = await fetch(API);
      const data = await res.json();
      render(data.results, data.refreshedAt);
    } catch(e) {
      document.getElementById('content').innerHTML =
        '<div style="padding:40px 20px;text-align:center;color:#888;font-size:13px;">Unable to load data. Please try again later.</div>';
    }
  }

  loadData();
  setInterval(loadData, 60 * 60 * 1000);
</script>
</body>
</html>
